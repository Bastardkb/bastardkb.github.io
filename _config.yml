title: Bastard Keyboards Documentation
description: Official Bastard Keyboards documentation

logo: "/assets/img/bk-1.png"
favicon_ico: "/assets/img/favicon.ico"

markdown: kramdown

remote_theme: just-the-docs/just-the-docs

exclude:
  - .jekyll-cache
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - _site/
  - building-locally.md
  - cspell.config.yaml
  - assets/pics/layouts/README.md

plugins:
  - jekyll-default-layout
  - jekyll-remote-theme

# Aux links for the upper right navigation
aux_links:
  #  "Bastard Keyboards on GitHub":
  #  - "https://github.com/bastardkb"

# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: true

# Sort order for navigation links
# nav_sort: case_insensitive # default, equivalent to nil
nav_sort: case_sensitive # Capital letters sorted before lowercase

# External navigation links
nav_external_links:
  - title: Bastard Keyboards on GitHub
    url: https://github.com/bastardkb
  - title: Bastard Keyboards website
    url: https://bastardkb.com
  - title: Bastard Keyboards discord
    url: https://bastardkb.com/discord

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Nice boxes for visibility
callouts:
  tip:
    title: Tip
    color: blue
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: grey-lt
  question:
    title: Question
    color: yellow

color_scheme: bkb-light

# Footer content
# appears at the bottom of every page's main content
# Note: The footer_content option is deprecated and will be removed in a future major release. Please use `_includes/footer_custom.html` for more robust
# markup / liquid-based content.
footer_content: "Copyright &copy; 2019-2026 Bastard Keyboards / Quentin Lebastard. All rights reserved."

# Footer last edited timestamp
last_edit_timestamp: true # show or hide edit time - page must have `last_modified_date` defined in the frontmatter
last_edit_time_format: "%b %e %Y at %I:%M %p" # uses ruby's time format: https://ruby-doc.org/stdlib-2.7.0/libdoc/time/rdoc/Time.html

# Footer "Edit this page on GitHub" link text
gh_edit_link: false # show or hide edit this page link
gh_edit_link_text: "Edit this page on GitHub."
gh_edit_repository: "https://github.com/bastardkb/bastardkb.github.io" # the github URL for your repo
gh_edit_branch: "main" # the branch that your docs is served from
# gh_edit_source: docs # the source that your files originate from
gh_edit_view_mode: "tree" # "tree" or "edit" if you want the user to jump into the editor immediately